; PlatformIO build config for the ESP32-C3 orientation tracker.
; Build/upload:  pio run -t upload    Monitor:  pio device monitor

[platformio]
; The sketch lives in ./esp32_tracker/ (not the default ./src/). Point src_dir
; straight at it so PlatformIO finds and preprocesses esp32_tracker.ino.
src_dir = esp32_tracker

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; ESP32-C3 SuperMini has only a native USB port (no UART bridge chip). Route
; Serial over USB Serial/JTAG so Serial.println() is visible on the USB monitor;
; without these, Serial goes to the physical UART0 pins and the USB shows nothing.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Pin NimBLE to the 1.4.x line the sketch is written against. If you prefer 2.x,
; update the onConnect/onDisconnect signatures in esp32_tracker.ino (see note there).
lib_deps =
    adafruit/Adafruit BNO08x@^1.2.5
    h2zero/NimBLE-Arduino@^1.4.2
